interface:
  display_name: "FindReason RAG Attribution"
  short_description: "Run FindReason badcase attribution from pasted cases or Fornax traces"
  default_prompt: "Use $findreason-rag-attribution through local python3 -m findreason scripts first. Prefer case_facts.json with embedded case context, local trace JSON, and --trace-file; when trace acquisition is unclear, check references/cases/ for the local-trace, rerun-from-input, and logid-fetch examples. Do not rely on Fornax, bytedcli, browser, MCP, or sub-agent tools unless the user explicitly asks for live fetching or publishing. Inspect generated case_facts.json, evidence_index.json, and true counterfactual experiment JSON; ignore legacy agent_brief.md and do not use agent_judgement.md as evidence. Then write or update the single concise agent_judgement.md with Chinese cause labels: 输入侧问题, 知识缺失或证据不足, 召回遗漏, 重排丢失, 答案生成错误, or 无明显错误/评估器不准，需人工进一步核实. Treat old slugs such as workflow_input_loss, suspected_knowledge_missing, retrieval_miss, rerank_drop, answer_failure, and evaluator_disputed_no_obvious_error as compatibility aliases only. Promote 输入侧问题 only when the verified query improves recall, ranking, replay, or final output. For evaluator_disputed_no_obvious_error, explicitly write the 人工复核点; 评估器输出暂无 is not enough."
